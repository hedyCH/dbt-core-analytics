version: 2

models:
  - name: dim_customers
    description: "One row per customer with lifetime stats"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: number_of_orders
        tests:
          - not_null

  - name: fct_orders
    description: "One row per order enriched with payment info"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null